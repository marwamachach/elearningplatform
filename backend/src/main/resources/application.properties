# ─── Serveur ────────────────────────────────────────────────────────────────
server.port=8080

# ─── Base de données MySQL ───────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/elearning_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ────────────────────────────────────────────────────────────────────
# Changez cette clé secrète en production !
jwt.secret=8f9a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a
jwt.expiration=86400000

# ─── Upload fichiers ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
file.upload-dir=./uploads

# ─── CORS ───────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.com.elearning=DEBUG
logging.level.org.springframework.security=WARN
